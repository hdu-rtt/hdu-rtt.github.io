<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EBCI RAG 知识库管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">EBCI Agent</p>
          <h1>RAG 知识库管理</h1>
        </div>
      </header>

      <section class="panel auth-panel" aria-labelledby="auth-title">
        <div class="section-title">
          <div>
            <p class="eyebrow">Access</p>
            <h2 id="auth-title">打开管理入口</h2>
          </div>
          <p id="entry-status" class="status-text" aria-live="polite"></p>
        </div>
        <form id="entry-form" class="entry-grid">
          <label class="field">
            <span>服务地址</span>
            <input
              id="agent-url-input"
              name="agent_url"
              type="url"
              autocomplete="url"
              placeholder="https://your-agent.example.com"
              required
            />
          </label>
          <button class="primary-button" type="submit">打开</button>
        </form>
        <p class="muted entry-note">
          管理界面会在服务域名下打开，以便浏览器按同源请求访问接口。
        </p>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
